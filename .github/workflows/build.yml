name: Build Linux AMD64 Musl Binary

于:
  push:
    标签:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-C target-feature=+crt-static"

jobs:
  build:
    name: Build Linux x86_64 Musl
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-action@stable
      with:
        targets: x86_64-unknown-linux-musl

    - name: Install musl-tools
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools libssl-dev pkg-config

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Build release binary
      run: |
        cargo build --release --target x86_64-unknown-linux-musl
        echo "Build completed successfully"

    - name: Verify binary
      run: |
        file target/x86_64-unknown-linux-musl/release/katelyatv-rust
        ldd target/x86_64-unknown-linux-musl/release/katelyatv-rust || echo "Binary is statically linked (expected)"
        
    - name: Create release archive
      run: |
        cd target/x86_64-unknown-linux-musl/release
        tar -czvf katelyatv-rust-linux-amd64-musl.tar.gz katelyatv-rust
        sha256sum katelyatv-rust-linux-amd64-musl.tar.gz > katelyatv-rust-linux-amd64-musl.tar.gz.sha256

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: katelyatv-rust-linux-amd64-musl
        path: target/x86_64-unknown-linux-musl/release/katelyatv-rust-linux-amd64-musl.*
        retention-days: 30

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: target/x86_64-unknown-linux-musl/release/katelyatv-rust-linux-amd64-musl.*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
