<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏 - KatelyaTV</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo">
                <h1>KatelyaTV</h1>
            </div>
            <nav class="menu">
                <a href="/" class="menu-item">首页</a>
                <a href="/search" class="menu-item">搜索</a>
                <a href="/favorites" class="menu-item active">收藏</a>
                <a href="/history" class="menu-item">历史</a>
                <a href="/admin" class="menu-item">管理面板</a>
                <a href="/config" class="menu-item">TVBox 配置</a>
                <a href="/about" class="menu-item">关于</a>
            </nav>
            <div class="user-info">
                {% if is_logged_in %}
                <span class="username">{{ username }}</span>
                <button id="logoutBtn" class="btn-logout">退出</button>
                {% else %}
                <a href="/login" class="btn-login">登录</a>
                <a href="/register" class="btn-register">注册</a>
                {% endif %}
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <header class="header">
                <h1>我的收藏</h1>
            </header>

            <div class="content">
                <section class="section">
                    <div id="favoritesContent">
                        <!-- 收藏内容将通过 JS 加载 -->
                    </div>
                    
                    <div id="noFavorites" style="display: none; text-align: center; padding: 60px 20px;">
                        <p style="font-size: 48px; margin-bottom: 20px;">⭐</p>
                        <p style="color: #888; margin-bottom: 20px;">暂无收藏内容</p>
                        <a href="/search" class="btn-primary">去搜索</a>
                    </div>
                    
                    <div id="needLogin" style="display: none; text-align: center; padding: 60px 20px;">
                        <p style="font-size: 48px; margin-bottom: 20px;">🔒</p>
                        <p style="color: #888; margin-bottom: 20px;">请先登录后查看收藏</p>
                        <a href="/login" class="btn-primary">立即登录</a>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="/static/js/favorites.js"></script>
</body>
</html>
