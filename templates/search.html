<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索 - KatelyaTV</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo">
                <h1>KatelyaTV</h1>
            </div>
            <nav class="menu">
                <a href="/" class="menu-item">首页</a>
                <a href="/search" class="menu-item active">搜索</a>
                <a href="/favorites" class="menu-item">收藏</a>
                <a href="/history" class="menu-item">历史</a>
                <a href="/admin" class="menu-item">管理面板</a>
                <a href="/config" class="menu-item">TVBox 配置</a>
                <a href="/about" class="menu-item">关于</a>
            </nav>
            <div class="user-info">
                {% if is_logged_in %}
                <span class="username">{{ username }}</span>
                <button id="logoutBtn" class="btn-logout">退出</button>
                {% else %}
                <a href="/login" class="btn-login">登录</a>
                <a href="/register" class="btn-register">注册</a>
                {% endif %}
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <header class="header">
                <div class="search-bar">
                    <input type="text" placeholder="搜索影视作品..." id="searchInput" value="{{ query }}">
                    <button onclick="search()">搜索</button>
                </div>
            </header>

            <div class="content">
                <section class="section">
                    <h2>搜索结果 {% if query %}: "{{ query }}" {% endif %}</h2>
                    
                    <div class="source-tabs" id="sourceTabs">
                        <!-- 播放源标签将通过 JS 加载 -->
                    </div>
                    
                    <div class="video-grid" id="searchResults">
                        <!-- 搜索结果将通过 JS 加载 -->
                    </div>
                    
                    <div id="noResults" style="display: none; text-align: center; padding: 40px; color: #888;">
                        <p>未找到相关内容</p>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="/static/js/search.js"></script>
</body>
</html>
