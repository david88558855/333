<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KatelyaTV - 影视聚合播放器</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo">
                <h1>KatelyaTV</h1>
            </div>
            <nav class="menu">
                <a href="/" class="menu-item active">首页</a>
                <a href="/search" class="menu-item">搜索</a>
                <a href="/favorites" class="menu-item">收藏</a>
                <a href="/history" class="menu-item">历史</a>
                {% if is_admin %}
                <a href="/admin" class="menu-item">管理面板</a>
                {% endif %}
                <a href="/config" class="menu-item">TVBox 配置</a>
                <a href="/about" class="menu-item">关于</a>
            </nav>
            <div class="user-info">
                {% if is_logged_in %}
                <span class="username">{{ username }}</span>
                <button id="logoutBtn" class="btn-logout">退出</button>
                {% else %}
                <a href="/login" class="btn-login">登录</a>
                {% if registration_open %}
                <a href="/register" class="btn-register">注册</a>
                {% endif %}
                {% endif %}
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <header class="header">
                <div class="search-bar">
                    <input type="text" placeholder="搜索影视作品..." id="searchInput">
                    <button onclick="search()">搜索</button>
                </div>
            </header>

            <div class="content">
                <section class="section">
                    <h2>豆瓣精选</h2>
                    <div class="video-grid" id="doubanGrid">
                        <!-- 视频卡片将通过 JS 加载 -->
                    </div>
                </section>

                <section class="section">
                    <h2>最近更新</h2>
                    <div class="video-grid" id="recentGrid">
                        <!-- 视频卡片将通过 JS 加载 -->
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
